# Tag-triggered release: build, Developer-ID-sign, notarize, staple, and
# attach the .dmg to a draft GitHub Release. tauri-cli handles the keychain
# import, codesign (hardened runtime + entitlements), notarytool --wait, and
# stapling itself — the secrets below are all it needs.
#
# Required repo secrets:
#   APPLE_CERTIFICATE            base64 of the Developer ID Application .p12
#   APPLE_CERTIFICATE_PASSWORD   the .p12 export password
#   APPLE_SIGNING_IDENTITY       "Developer ID Application: <name> (<team>)"
#   APPLE_API_ISSUER             App Store Connect API Issuer ID (UUID)
#   APPLE_API_KEY                App Store Connect API Key ID (10 chars)
#   APPLE_API_KEY_CONTENT        contents of AuthKey_<KEYID>.p8
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    timeout-minutes: 90 # first-ever notarization for a team can be slow
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      # the yt-dlp sidecar (transcription externalBin) is git-ignored — fetch it
      # before the build or `tauri build` aborts on the missing resource path
      - name: Fetch yt-dlp sidecar
        run: bash src-tauri/scripts/fetch-yt-dlp.sh

      - name: Write App Store Connect API key
        run: printf '%s' "$APPLE_API_KEY_CONTENT" > "$RUNNER_TEMP/AuthKey.p8"
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}

      - uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Attestrum Booth v__VERSION__"
          releaseDraft: true
          args: --target aarch64-apple-darwin

      # attestrum.com deep-links the dmg by a VERSION-STABLE name via
      # /releases/latest/download/ — upload a stable-named copy alongside
      # the versioned asset.
      - name: Upload stable-named dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dmg=$(ls src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg | head -1)
          cp "$dmg" Booth-macOS-AppleSilicon.dmg
          gh release upload "${{ github.ref_name }}" Booth-macOS-AppleSilicon.dmg --clobber -R "${{ github.repository }}"

  # Windows x64 build. Currently UNSIGNED — installers trigger a one-time
  # SmartScreen "Unknown Publisher" prompt until Authenticode signing is added.
  # Whisper runs CPU-only on Windows (see Cargo.toml target tables), so no GPU
  # toolkit is needed on the runner.
  release-windows:
    needs: release # let the macOS job create the draft release first (avoids a create race)
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      # Fetch the Windows yt-dlp sidecar (yt-dlp.exe → yt-dlp-x86_64-pc-windows-msvc.exe).
      # Runs under Git Bash, which ships on windows-latest.
      - name: Fetch yt-dlp sidecar
        shell: bash
        run: bash src-tauri/scripts/fetch-yt-dlp.sh

      - uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Attestrum Booth v__VERSION__"
          releaseDraft: true
          args: --target x86_64-pc-windows-msvc --bundles nsis

      # Stable-named installer for attestrum.com deep-links, mirroring the
      # macOS dmg convention.
      - name: Upload stable-named installer
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          setup=$(ls src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe | head -1)
          cp "$setup" Booth-Windows-x64-setup.exe
          gh release upload "${{ github.ref_name }}" Booth-Windows-x64-setup.exe --clobber -R "${{ github.repository }}"
